; kikimimi CoreS3 ファーム
; platform は pioarduino fork(公式 espressif32 は Arduino core 2.x 止まりのため)
[platformio]
default_envs = cores3

[env:cores3]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
board = m5stack-cores3
framework = arduino
monitor_speed = 115200
monitor_filters = esp32_exception_decoder
build_flags =
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
lib_deps =
    m5stack/M5Unified@^0.2.17
    m5stack/M5GFX@^0.2.23

; pure/(デバイス非依存の純関数)を PC 上で単体テストする環境
; 実行: uvx --from platformio pio test -e native
[env:native]
platform = native
test_build_src = yes
build_src_filter = +<pure/>
build_flags = -std=c++17
